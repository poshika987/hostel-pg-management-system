<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Warden Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root { --bg:#10131c; --surface:#181c29; --surface2:#202638; --border:#30364b; --text:#f4f6ff; --muted:#9aa2c2; --accent:#17c3b2; --accent2:#ffcb77; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; font-family:'Sora', sans-serif; background:radial-gradient(circle at top right, rgba(23,195,178,.2), transparent 32%), var(--bg); color:var(--text); }
    .wrap { width:min(1040px, calc(100% - 32px)); margin:0 auto; padding:48px 0; }
    .hero { display:flex; justify-content:space-between; gap:24px; align-items:flex-start; margin-bottom:24px; }
    h1 { margin:0; font-size:2rem; letter-spacing:-.04em; }
    p { color:var(--muted); line-height:1.6; margin:.45rem 0 0; }
    .actions { display:flex; gap:12px; flex-wrap:wrap; }
    .btn { display:inline-flex; border:1px solid var(--border); background:var(--surface2); color:var(--text); border-radius:12px; padding:12px 16px; text-decoration:none; font-weight:700; font-family:'Sora', sans-serif; cursor:pointer; }
    .btn-accent { border:none; background:linear-gradient(135deg, var(--accent), #21e6d3); color:#06211f; }
    .grid { display:grid; grid-template-columns:280px 1fr; gap:18px; align-items:start; }
    .card { background:rgba(24,28,41,.9); border:1px solid var(--border); border-radius:20px; padding:22px; box-shadow:0 22px 50px rgba(0,0,0,.22); }
    .metric label { color:var(--muted); text-transform:uppercase; letter-spacing:.08em; font-size:.72rem; font-weight:800; }
    .metric strong { display:block; font-size:3rem; margin-top:8px; color:var(--accent2); }
    .list { display:grid; gap:12px; margin-top:14px; }
    .item { border:1px solid var(--border); background:rgba(255,255,255,.02); border-radius:14px; padding:14px; }
    .item strong { display:block; }
    .meta { color:var(--muted); font-size:.78rem; margin-top:4px; }
    @media (max-width:800px) { .hero, .grid { display:block; } .actions { margin-top:16px; } .card { margin-bottom:16px; } }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div>
        <h1>Warden Dashboard</h1>
        <p>Manage maintenance complaints, assign staff, and keep students updated through the notification service.</p>
      </div>
      <div class="actions">
        <a class="btn btn-accent" th:href="@{/warden/complaints}">Manage Complaints</a>
        <form th:action="@{/logout}" method="post"><button class="btn" type="submit">Sign Out</button></form>
      </div>
    </section>

    <section class="grid">
      <div class="card metric">
        <label>Open Complaints</label>
        <strong th:text="${openComplaintCount}">0</strong>
        <p>Pending, assigned, in-progress, and reopened issues that still need attention.</p>
      </div>
      <div class="card">
        <h2>Recent Complaints</h2>
        <div class="list" th:if="${!recentComplaints.isEmpty()}">
          <div class="item" th:each="c : ${recentComplaints}">
            <strong th:text="${'#' + c.complaintId + ' - ' + c.title}">Complaint</strong>
            <div class="meta" th:text="${c.student.name + ' | ' + c.status + ' | ' + c.priority}">Student</div>
          </div>
        </div>
        <p th:if="${recentComplaints.isEmpty()}">No complaints have been raised yet.</p>
      </div>
    </section>
  </main>
</body>
</html>
