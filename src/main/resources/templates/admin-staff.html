<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Manage Staff Records</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root { --bg:#0d1117; --surface:#151b23; --surface2:#1f2733; --border:#303846; --text:#edf2f7; --muted:#94a3b8; --accent:#2dd4bf; --danger:#fb7185; --ok:#86efac; }
body { min-height:100vh; background:var(--bg); color:var(--text); font-family:'Sora', sans-serif; }
.header { padding:2rem; display:flex; justify-content:space-between; align-items:flex-start; gap:1rem; border-bottom:1px solid var(--border); background:var(--surface); }
h1 { font-size:1.65rem; }
p { color:var(--muted); margin-top:.35rem; font-size:.9rem; line-height:1.55; }
.actions { display:flex; flex-wrap:wrap; gap:.65rem; }
.btn, a.btn { border:1px solid var(--border); background:var(--surface2); color:var(--text); text-decoration:none; border-radius:8px; padding:.65rem .9rem; font-weight:700; font-family:'Sora', sans-serif; cursor:pointer; }
.btn-primary { background:var(--accent); color:#042f2e; border-color:var(--accent); }
.btn-danger { border-color:rgba(251,113,133,.5); color:var(--danger); }
.shell { padding:2rem; display:grid; grid-template-columns:340px 1fr; gap:1rem; align-items:start; }
.panel, .table-wrap { background:var(--surface); border:1px solid var(--border); border-radius:8px; overflow:hidden; }
.panel { padding:1rem; }
.panel h2 { font-size:1rem; margin-bottom:1rem; }
label { display:block; color:var(--muted); font-size:.72rem; font-weight:800; text-transform:uppercase; letter-spacing:.08em; margin:.75rem 0 .35rem; }
input { width:100%; background:#0f141b; color:var(--text); border:1px solid var(--border); border-radius:8px; padding:.7rem; font-family:'Sora', sans-serif; }
.field-error { color:var(--danger); font-size:.75rem; margin-top:.25rem; }
.alert { padding:.85rem 1rem; border-radius:8px; margin-bottom:1rem; }
.alert-success { color:var(--ok); border:1px solid rgba(134,239,172,.35); background:rgba(134,239,172,.1); }
.alert-error { color:var(--danger); border:1px solid rgba(251,113,133,.35); background:rgba(251,113,133,.1); }
table { width:100%; border-collapse:collapse; min-width:760px; }
th { text-align:left; color:var(--muted); background:var(--surface2); padding:.85rem; text-transform:uppercase; font-size:.68rem; letter-spacing:.08em; }
td { padding:.85rem; border-top:1px solid var(--border); vertical-align:top; font-size:.82rem; }
.inline-form { display:grid; grid-template-columns:1fr 1fr 1fr auto auto; gap:.5rem; align-items:center; }
.inline-form input { min-width:120px; }
.badge { display:inline-flex; padding:.25rem .6rem; border-radius:8px; font-size:.72rem; font-weight:800; background:var(--surface2); color:var(--muted); border:1px solid var(--border); }
.empty { padding:2rem; text-align:center; color:var(--muted); }
@media (max-width:980px) { .header { display:block; padding:1rem; } .actions { margin-top:1rem; } .shell { grid-template-columns:1fr; padding:1rem; } .table-wrap { overflow:auto; } .inline-form { grid-template-columns:1fr; } }
</style>
</head>
<body>
<header class="header">
  <div>
    <h1>Manage Staff Records</h1>
    <p>Keep maintenance staff information current before assigning complaint work.</p>
  </div>
  <div class="actions">
    <a class="btn" th:href="@{/admin/dashboard}">Dashboard</a>
    <a class="btn" th:href="@{/reports(type='complaint')}">Reports</a>
    <form th:action="@{/logout}" method="post"><button class="btn btn-primary" type="submit">Sign Out</button></form>
  </div>
</header>

<main class="shell">
  <section class="panel">
    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="alert alert-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>
    <h2>Add Staff Member</h2>
    <form th:action="@{/admin/staff}" th:object="${staffForm}" method="post">
      <label for="name">Name</label>
      <input id="name" th:field="*{name}" placeholder="Staff name"/>
      <div class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>

      <label for="role">Role</label>
      <input id="role" th:field="*{role}" placeholder="Electrician, plumber, cleaner"/>
      <div class="field-error" th:if="${#fields.hasErrors('role')}" th:errors="*{role}"></div>

      <label for="contact">Contact</label>
      <input id="contact" th:field="*{contact}" placeholder="Phone or email"/>
      <div class="field-error" th:if="${#fields.hasErrors('contact')}" th:errors="*{contact}"></div>

      <button class="btn btn-primary" style="margin-top:1rem;width:100%;" type="submit">Add Staff Record</button>
    </form>
  </section>

  <section class="table-wrap">
    <table th:if="${!staffMembers.isEmpty()}">
      <thead>
        <tr><th>ID</th><th>Staff Details</th><th>Active Tasks</th><th>Update Record</th></tr>
      </thead>
      <tbody>
        <tr th:each="staff : ${staffMembers}">
          <td th:text="${staff.staffId}">1</td>
          <td>
            <strong th:text="${staff.name}">Name</strong>
            <p th:text="${staff.role + ' | ' + staff.contact}">Role | Contact</p>
          </td>
          <td><span class="badge" th:text="${activeTasks[staff.staffId]} + ' active'">0 active</span></td>
          <td>
            <form class="inline-form" th:action="@{'/admin/staff/' + ${staff.staffId}}" method="post">
              <input name="name" th:value="${staff.name}" required maxlength="80"/>
              <input name="role" th:value="${staff.role}" required maxlength="80"/>
              <input name="contact" th:value="${staff.contact}" required maxlength="40"/>
              <button class="btn btn-primary" type="submit">Update</button>
            </form>
            <form th:action="@{'/admin/staff/' + ${staff.staffId} + '/delete'}" method="post" style="margin-top:.5rem;">
              <button class="btn btn-danger" type="submit"
                      th:disabled="${activeTasks[staff.staffId] > 0}"
                      th:title="${activeTasks[staff.staffId] > 0 ? 'Staff has active assigned complaints' : 'Delete staff record'}">Delete</button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
    <div class="empty" th:if="${staffMembers.isEmpty()}">No staff records found.</div>
  </section>
</main>
</body>
</html>
