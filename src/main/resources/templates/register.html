<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Register – Hostel Management System</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0f18; --surface: #161923; --surface2: #1e2235;
  --accent: #7c6af7; --accent-glow: rgba(124,106,247,.25);
  --text: #e8eaf6; --muted: #7b80a0; --border: #252a42;
  --success: #43e97b; --error: #ff5c7a;
}
body {
  font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text);
  min-height: 100vh; display: grid; place-items: center; padding: 2rem 1.5rem;
  background-image: radial-gradient(ellipse at 80% 50%, rgba(124,106,247,.08) 0%, transparent 60%);
}
.wrap { width: 100%; max-width: 460px; }
.brand { text-align: center; margin-bottom: 2rem; }
.brand-icon {
  display: inline-flex; align-items: center; justify-content: center;
  width: 56px; height: 56px; background: linear-gradient(135deg, var(--accent), #a78bfa);
  border-radius: 16px; font-size: 1.75rem; margin-bottom: .75rem;
  box-shadow: 0 0 28px var(--accent-glow);
}
.brand h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: -.02em; }
.brand p  { color: var(--muted); font-size: .85rem; margin-top: .2rem; }

.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 2rem;
  box-shadow: 0 20px 60px rgba(0,0,0,.4);
}
.card-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 1.5rem; }

.alert {
  padding: .75rem 1rem; border-radius: 10px; font-size: .85rem;
  margin-bottom: 1.25rem;
}
.alert-error { background: rgba(255,92,122,.1); border: 1px solid rgba(255,92,122,.3); color: var(--error); }

.row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.form-group { margin-bottom: 1.15rem; }
label {
  display: block; font-size: .75rem; font-weight: 600; color: var(--muted);
  text-transform: uppercase; letter-spacing: .07em; margin-bottom: .45rem;
}
input {
  width: 100%; background: var(--surface2); border: 1.5px solid var(--border);
  color: var(--text); padding: .75rem .9rem; border-radius: 11px;
  font-size: .9rem; font-family: 'Sora', sans-serif;
  transition: border-color .2s, box-shadow .2s; outline: none;
}
input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
input::placeholder { color: var(--muted); }

.hint { font-size: .72rem; color: var(--muted); margin-top: .35rem; }

.btn-primary {
  width: 100%; padding: .9rem; background: linear-gradient(135deg, var(--accent), #a78bfa);
  color: white; border: none; border-radius: 11px; font-size: .95rem;
  font-weight: 600; font-family: 'Sora', sans-serif; cursor: pointer;
  transition: opacity .2s, transform .15s; box-shadow: 0 4px 20px var(--accent-glow);
  margin-top: .5rem;
}
.btn-primary:hover { opacity: .92; transform: translateY(-1px); }

.footer { text-align: center; margin-top: 1.5rem; color: var(--muted); font-size: .875rem; }
.footer a { color: var(--accent); text-decoration: none; font-weight: 600; }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="brand-icon">🏠</div>
    <h1>Hostel Management System</h1>
    <p>Create your student account</p>
  </div>

  <div class="card">
    <div class="card-title">Student Registration</div>

    <div class="alert alert-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <form th:action="@{/register}" th:object="${student}" method="post">
      <div class="row">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" th:field="*{name}" placeholder="Jane Doe" required/>
        </div>
        <div class="form-group">
          <label>Student Code</label>
          <input type="text" th:field="*{studentCode}" placeholder="PES2UG23CS001" required/>
        </div>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" th:field="*{email}" placeholder="jane@example.com" required/>
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="text" th:field="*{phone}" placeholder="9876543210" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" th:field="*{password}" placeholder="Min. 6 characters" required minlength="6"/>
        <p class="hint">Use at least 6 characters.</p>
      </div>
      <button type="submit" class="btn-primary">Create Account →</button>
    </form>
  </div>

  <div class="footer">
    Already have an account? <a th:href="@{/login}">Sign in</a>
  </div>
</div>
</body>
</html>
