<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/>
<title>Payment Result</title>
<meta http-equiv="refresh" content="3;url=/payments/history"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
body { font-family: 'Sora', sans-serif; background: #0d0f18; color: #e8eaf6;
  min-height: 100vh; display: grid; place-items: center; }
.card { background: #161923; border: 1px solid #252a42; border-radius: 20px; padding: 3rem;
  text-align: center; max-width: 420px; }
.icon { font-size: 3rem; margin-bottom: 1rem; }
h2 { font-size: 1.4rem; font-weight: 700; }
p { color: #7b80a0; margin-top: .75rem; font-size: .9rem; }
a { color: #7c6af7; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">✅</div>
  <h2 th:text="${message}">Payment Successful</h2>
  <p>Redirecting to your payment history… <a href="/payments/history">Click here</a> if not redirected.</p>
</div>
</body>
</html>
