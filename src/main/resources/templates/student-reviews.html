<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Give Review</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root { --bg:#0d1117; --surface:#151b23; --surface2:#1f2733; --border:#303846; --text:#edf2f7; --muted:#94a3b8; --accent:#2dd4bf; --danger:#fb7185; --ok:#86efac; }
body { min-height:100vh; background:var(--bg); color:var(--text); font-family:'Sora', sans-serif; }
.header { padding:2rem; display:flex; justify-content:space-between; align-items:flex-start; gap:1rem; border-bottom:1px solid var(--border); background:var(--surface); }
h1 { font-size:1.6rem; }
p { color:var(--muted); margin-top:.35rem; font-size:.9rem; line-height:1.55; }
.actions { display:flex; flex-wrap:wrap; gap:.65rem; }
.btn, a.btn { border:1px solid var(--border); background:var(--surface2); color:var(--text); text-decoration:none; border-radius:8px; padding:.7rem 1rem; font-weight:700; font-family:'Sora', sans-serif; cursor:pointer; }
.btn-primary { background:var(--accent); color:#042f2e; border-color:var(--accent); }
.shell { padding:2rem; display:grid; grid-template-columns:360px 1fr; gap:1rem; align-items:start; }
.panel, .table-wrap { background:var(--surface); border:1px solid var(--border); border-radius:8px; overflow:hidden; }
.panel { padding:1rem; }
label { display:block; color:var(--muted); font-size:.72rem; font-weight:800; text-transform:uppercase; letter-spacing:.08em; margin:.8rem 0 .35rem; }
select, textarea { width:100%; background:#0f141b; color:var(--text); border:1px solid var(--border); border-radius:8px; padding:.75rem; font-family:'Sora', sans-serif; }
textarea { min-height:130px; resize:vertical; }
.rating { display:grid; grid-template-columns:repeat(5, 1fr); gap:.45rem; }
.rating input { position:absolute; opacity:0; pointer-events:none; }
.rating label { margin:0; text-align:center; padding:.75rem 0; border:1px solid var(--border); border-radius:8px; background:var(--surface2); cursor:pointer; color:var(--text); }
.rating input:checked + label { background:var(--accent); color:#042f2e; border-color:var(--accent); }
.alert { padding:.85rem 1rem; border-radius:8px; margin-bottom:1rem; }
.alert-success { color:var(--ok); border:1px solid rgba(134,239,172,.35); background:rgba(134,239,172,.1); }
.alert-error { color:var(--danger); border:1px solid rgba(251,113,133,.35); background:rgba(251,113,133,.1); }
table { width:100%; border-collapse:collapse; min-width:640px; }
th { text-align:left; color:var(--muted); background:var(--surface2); padding:.85rem; text-transform:uppercase; font-size:.68rem; letter-spacing:.08em; }
td { padding:.85rem; border-top:1px solid var(--border); vertical-align:top; font-size:.84rem; }
.badge { display:inline-flex; border-radius:8px; padding:.25rem .6rem; background:rgba(45,212,191,.12); color:var(--accent); border:1px solid rgba(45,212,191,.3); font-weight:800; }
.empty { padding:2rem; text-align:center; color:var(--muted); }
@media (max-width:900px) { .header { display:block; padding:1rem; } .actions { margin-top:1rem; } .shell { grid-template-columns:1fr; padding:1rem; } .table-wrap { overflow:auto; } }
</style>
</head>
<body>
<header class="header">
  <div>
    <h1>Give Review</h1>
    <p>Share feedback about your hostel experience.</p>
  </div>
  <div class="actions">
    <a class="btn" th:href="@{/student/dashboard}">Dashboard</a>
    <form th:action="@{/logout}" method="post"><button class="btn btn-primary" type="submit">Sign Out</button></form>
  </div>
</header>

<main class="shell">
  <section class="panel">
    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="alert alert-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>
    <form th:action="@{/student/reviews}" method="post">
      <label>Rating</label>
      <div class="rating">
        <span th:each="value : ${#numbers.sequence(1,5)}">
          <input th:id="'rating-' + ${value}" type="radio" name="rating" th:value="${value}" th:checked="${value == 5}" required/>
          <label th:for="'rating-' + ${value}" th:text="${value}">5</label>
        </span>
      </div>

      <label for="category">Category</label>
      <select id="category" name="category" required>
        <option th:each="category : ${categories}" th:value="${category}" th:text="${category}">Overall</option>
      </select>

      <label for="comments">Comments</label>
      <textarea id="comments" name="comments" maxlength="1000" placeholder="Write your feedback here"></textarea>

      <button class="btn btn-primary" style="width:100%;margin-top:1rem;" type="submit">Submit Review</button>
    </form>
  </section>

  <section class="table-wrap">
    <table th:if="${!reviews.isEmpty()}">
      <thead><tr><th>Rating</th><th>Category</th><th>Comments</th><th>Submitted</th></tr></thead>
      <tbody>
        <tr th:each="review : ${reviews}">
          <td><span class="badge" th:text="${review.rating} + '/5'">5/5</span></td>
          <td th:text="${review.category}">Overall</td>
          <td th:text="${review.comments}">Comments</td>
          <td th:text="${#temporals.format(review.createdAt, 'dd MMM yyyy, HH:mm')}">Date</td>
        </tr>
      </tbody>
    </table>
    <div class="empty" th:if="${reviews.isEmpty()}">No reviews submitted yet.</div>
  </section>
</main>
</body>
</html>
