<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Accountant Dashboard</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #1f2937;
    }
    .card {
      width: min(560px, calc(100% - 32px));
      padding: 32px;
      border-radius: 16px;
      background: #ffffff;
      box-shadow: 0 18px 48px rgba(15, 23, 42, 0.12);
    }
    h1 { margin-top: 0; }
    p { line-height: 1.6; }
    a {
      display: inline-block;
      margin-top: 16px;
      color: #0f62fe;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <section class="card">
    <h1>Accountant Dashboard</h1>
    <p>Your login is working correctly. This dashboard route is available now, but the accountant-specific workflows still need to be built.</p>
    <a th:href="@{/login}">Back to login</a>
  </section>
</body>
</html>
